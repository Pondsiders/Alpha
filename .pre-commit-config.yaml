repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: sh -c 'cd mechanism && uv run basedpyright'
        language: system
        types: [python]
        pass_filenames: false
